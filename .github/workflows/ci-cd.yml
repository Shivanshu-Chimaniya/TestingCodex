name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install frontend deps
        run: npm --prefix frontend ci

      - name: Lint + typecheck
        run: npm run typecheck

      - name: Unit + integration tests
        run: node --test

      - name: Build artifacts
        run: |
          npm run build
          npm --prefix frontend run build

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: dist

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Preview deployment placeholder
        run: echo "Deploying preview to Vercel/Render via project integrations"

  deploy-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: quality
    environment:
      name: production
    steps:
      - name: Production gate approved
        run: echo "Manual gate passed. Trigger production deployment webhook here."
